services:
    nginx:
        image: nginx:stable-alpine
        restart: unless-stopped
        ports:
            - "${APP_PORT:-80}:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
            - ./docker/nginx/site.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - app-network

    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
            args:
                UID: ${UID:-1000}
                GID: ${GID:-1000}
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - ./storage:/var/www/html/storage
            - ./bootstrap/cache:/var/www/html/bootstrap/cache
            - composer_cache:/composer
        environment:
            APP_ENV: ${APP_ENV}
            APP_DEBUG: ${APP_DEBUG}
            DB_CONNECTION: ${DB_CONNECTION}
            DB_HOST: ${DB_HOST}
            DB_PORT: ${DB_PORT}
            DB_DATABASE: ${DB_DATABASE}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
        networks:
            - app-network

    db:
        image: postgres:17-alpine
        restart: unless-stopped
        environment:
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_DB: ${DB_DATABASE}
        volumes:
            - postgres-data:/var/lib/postgresql/data
        ports:
            - "127.0.0.1:${DB_EXTERNAL_PORT}:5432"
        networks:
            - app-network

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        ports:
            - "127.0.0.1:6379:6379"
        volumes:
            - redis-data:/data
        networks:
            - app-network

    queue-worker:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
            - ./storage:/var/www/html/storage
            - ./bootstrap/cache:/var/www/html/bootstrap/cache
        command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=60
        depends_on:
            - app
            - redis
        networks:
            - app-network

    adminer:
        image: adminer:4.8.1
        restart: unless-stopped
        networks:
            - app-network
        ports:
            - "127.0.0.1:8080:8080"


networks:
    app-network:
        driver: bridge

volumes:
    postgres-data:
    composer_cache:
    redis-data:
