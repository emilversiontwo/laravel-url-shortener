# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  DOCKER_COMPOSE: "docker-compose.yaml"
  APP_CONTAINER: "app"
  COMPOSE_PROD: docker compose --file docker-compose.prod.yml

tasks:
  default:
    cmd: task --list
    silent: true

  dc:
    desc: "Shorthand for docker compose and default file reference"
    cmd: docker compose --file {{.DOCKER_COMPOSE}} {{.CLI_ARGS}}
    silent: true

  dcexec:
    internal: true
    cmds:
      - task: dc
        vars: { CLI_ARGS: 'exec {{.CLI_ARGS}}' }

  artisan:
    desc: example= task artisan -- migrate
    cmds:
      - task: dcexec
        vars: { CLI_ARGS: '{{.APP_CONTAINER}} php artisan {{.CLI_ARGS}}' }
    silent: true

  composer:
    desc: example= task composer -- i
    cmds:
      - task: dcexec
        vars: { CLI_ARGS: '{{.APP_CONTAINER}} composer {{.CLI_ARGS}}' }
    silent: true

  setup:
    desc: Use on first launch
    silent: true
    cmds:
      - cmd: "cp -n .env.example .env"
      - task: dc
        vars: { CLI_ARGS: 'build --no-cache' }
      - task: dc
        vars: { CLI_ARGS: 'up -d --force-recreate --remove-orphans' }
      - task: composer
        vars: { CLI_ARGS: 'install' }
      - task: artisan
        vars: { CLI_ARGS: 'key:generate' }
      - task: artisan
        vars: { CLI_ARGS: 'migrate:fresh' }
      - task: artisan
        vars: { CLI_ARGS: 'db:seed' }
      - task: artisan
        vars: { CLI_ARGS: 'filament:assets' }

  up:
    silent: true
    desc: "Brings up the environment \n
          If you want to do the same with build, write \n
          example= task up -- build"
    cmds:
      - task: dc
        if: '{{eq .CLI_ARGS "build"}}'
        vars: { CLI_ARGS: 'build' }
      - task: dc
        vars: { CLI_ARGS: 'down' }
      - task: dc
        vars: { CLI_ARGS: 'up -d --force-recreate' }

  down:
    silent: true
    cmds:
      - task: dc
        vars: { CLI_ARGS: 'down' }

  app-cache-clear:
    silent: true
    aliases:
      - 'appcc'
    cmds:
      - task: artisan
        vars: { CLI_ARGS: 'optimize:clear' }
      - task: artisan
        vars: { CLI_ARGS: 'optimize' }

  db-fresh-seed:
    desc: a command for quickly executing the db fresh and db seed commands
    silent: true
    aliases:
      - 'dbfs'
    cmds:
      - task: artisan
        vars: { CLI_ARGS: 'migrate:fresh' }
      - task: artisan
        vars: { CLI_ARGS: 'db:seed' }

  deploy:
    desc: Deploy to production
    silent: true
    cmds:
      - echo "Starting production deployment..."

      - echo "Building Docker images..."
      - '{{.COMPOSE_PROD}} build --no-cache app'

      - echo "Starting services..."
      - '{{.COMPOSE_PROD}} up -d'

      - echo "Waiting for database..."
      - sleep 5

      - echo "Generating APP_KEY..."
      - '{{.COMPOSE_PROD}} exec -T app php artisan key:generate --force'

      - echo "Running migrations..."
      - '{{.COMPOSE_PROD}} exec -T app php artisan migrate --force'

      - echo "Optimizing Laravel..."
      - '{{.COMPOSE_PROD}} exec -T app php artisan config:cache'
      - '{{.COMPOSE_PROD}} exec -T app php artisan route:cache'
      - '{{.COMPOSE_PROD}} exec -T app php artisan view:cache'
      - '{{.COMPOSE_PROD}} exec -T app php artisan event:cache'
      - '{{.COMPOSE_PROD}} exec -T app php artisan horizon:publish'

      - echo "Creating storage link..."
      - '{{.COMPOSE_PROD}} exec -T app php artisan storage:link'

      - echo "Deployment completed!"
      - echo ""
      - echo "Next steps:"
      - echo "1. Configure Caddy to proxy s.soupik.ru -> localhost:8080"
      - echo "2. Check logs - {{.COMPOSE_PROD}} logs -f app"
      - echo "3. Horizon UI - https://s.soupik.ru/horizon"

  deploy:update:
    desc: Update production (after git pull)
    silent: true
    cmds:
      - echo "Updating production..."
      - '{{.COMPOSE_PROD}} build app'
      - '{{.COMPOSE_PROD}} up -d'
      - '{{.COMPOSE_PROD}} exec -T app php artisan migrate --force'
      - '{{.COMPOSE_PROD}} exec -T app php artisan config:cache'
      - '{{.COMPOSE_PROD}} exec -T app php artisan route:cache'
      - '{{.COMPOSE_PROD}} exec -T app php artisan view:cache'
      - echo "Update completed!"

  deploy:logs:
    desc: Show production logs
    cmds:
      - '{{.COMPOSE_PROD}} logs -f app'

  deploy:stop:
    desc: Stop production
    cmds:
      - '{{.COMPOSE_PROD}} down'

  deploy:restart:
    desc: Restart production
    cmds:
      - '{{.COMPOSE_PROD}} restart'
